version: 1
disable_existing_loggers: false

formatters:
  default:
    format: '%(levelname)s:\t%(name)s - %(message)s'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: default
    stream: ext://sys.stdout

loggers:
  # 应用关键日志（只显示 middleware 的关键信息）
  graph.middlewares.cache:
    level: INFO
    handlers: [console]
    propagate: false

  graph.middlewares.compression:
    level: INFO
    handlers: [console]
    propagate: false

  graph.middlewares.skills_router:
    level: INFO
    handlers: [console]
    propagate: false

  graph.middlewares.task_state:
    level: INFO
    handlers: [console]
    propagate: false

  tools.deep_research_tool:
    level: INFO
    handlers: [console]
    propagate: false

  # 抑制噪声日志
  httpx:
    level: WARNING
    handlers: [console]
    propagate: false

  transformers:
    level: WARNING
    handlers: [console]
    propagate: false

  uvicorn.access:
    level: WARNING
    handlers: [console]
    propagate: false

  uvicorn.error:
    level: INFO
    handlers: [console]
    propagate: false

root:
  level: WARNING
  handlers: [console]
