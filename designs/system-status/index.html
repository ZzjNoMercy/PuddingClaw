<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统状态 - PuddingClaw</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            klein: { 50: '#eef2ff', 100: '#dde4ff', 500: '#002fa7', 600: '#002590', 700: '#001b70' },
            surface: '#f6f7f9',
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Display"', '"Helvetica Neue"', '"Segoe UI"', 'Roboto', 'sans-serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.25s ease-out',
            'slide-up': 'slideUp 0.3s ease-out',
          },
          keyframes: {
            fadeIn: { from: { opacity: '0' }, to: { opacity: '1' } },
            slideUp: { from: { opacity: '0', transform: 'translateY(6px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
          },
        }
      }
    }
  </script>
  <style>
    :root { --accent: #002fa7; }
    body { background: #f6f7f9; color: #1d1d1f; -webkit-font-smoothing: antialiased; }
    .glass { background: rgba(255,255,255,0.68); backdrop-filter: blur(28px) saturate(160%); -webkit-backdrop-filter: blur(28px) saturate(160%); }
    .glass-card { background: rgba(255,255,255,0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(0,0,0,0.06); }
    .glass-card-hover:hover { background: rgba(255,255,255,0.8); }
    @keyframes pulse-ring { 0% { transform: scale(0.85); opacity: 0.7; } 100% { transform: scale(2.4); opacity: 0; } }
    .status-dot-pulse::before { content: ''; position: absolute; inset: -4px; border-radius: 50%; background: currentColor; animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; opacity: 0.35; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    // ── Icons (inline SVG to keep prototype self-contained) ──────────────
    const IconBot = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="3" y="11" width="18" height="10" rx="2"></rect>
        <circle cx="12" cy="5" r="2"></circle>
        <path d="M12 7v4"></path>
        <line x1="8" y1="16" x2="8" y2="16.01"></line>
        <line x1="16" y1="16" x2="16" y2="16.01"></line>
      </svg>
    );
    const IconSparkles = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path>
      </svg>
    );
    const IconDatabase = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
        <path d="M3 5V19A9 3 0 0 0 21 19V5"></path>
        <path d="M3 12A9 3 0 0 0 21 12"></path>
      </svg>
    );
    const IconHardDrive = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <line x1="2" y1="10" x2="22" y2="10"></line>
        <path d="M5 10v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8"></path>
        <path d="M6 22v-2"></path>
        <path d="M18 22v-2"></path>
      </svg>
    );
    const IconSliders = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <line x1="4" y1="21" x2="4" y2="14"></line>
        <line x1="4" y1="10" x2="4" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="12"></line>
        <line x1="12" y1="8" x2="12" y2="3"></line>
        <line x1="20" y1="21" x2="20" y2="16"></line>
        <line x1="20" y1="12" x2="20" y2="3"></line>
        <line x1="1" y1="14" x2="7" y2="14"></line>
        <line x1="9" y1="8" x2="15" y2="8"></line>
        <line x1="17" y1="16" x2="23" y2="16"></line>
      </svg>
    );
    const IconBrain = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M12 18V5"></path>
        <path d="M15 13a4.17 4.17 0 0 1-3-4 4.17 4.17 0 0 1-3 4"></path>
        <path d="M17.598 11.285a5 5 0 0 0 .565-3.86A5.04 5.04 0 0 0 13.29 2.47a5 5 0 0 0-4.88 4.27 5 5 0 0 0-3.87 3.86 5.04 5.04 0 0 0 2.87 5.95"></path>
        <path d="M7.9 16A5 5 0 0 0 12 21a5 5 0 0 0 4.1-5"></path>
      </svg>
    );
    const IconActivity = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
      </svg>
    );
    const IconCheck = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M20 6 9 17l-5-5"></path>
      </svg>
    );
    const IconX = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M18 6 6 18"></path>
        <path d="m6 6 12 12"></path>
      </svg>
    );
    const IconLoader = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M12 2v4"></path>
        <path d="m16.2 7.8 2.9-2.9"></path>
        <path d="M22 12h-4"></path>
        <path d="m16.2 16.2 2.9 2.9"></path>
        <path d="M12 22v-4"></path>
        <path d="m4.9 19.1 2.9-2.9"></path>
        <path d="M2 12h4"></path>
        <path d="m4.9 4.9 2.9 2.9"></path>
      </svg>
    );
    const IconAlert = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
    );
    const IconChevronDown = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="m6 9 6 6 6-6"></path>
      </svg>
    );
    const IconArrowLeft = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="m12 19-7-7 7-7"></path>
        <path d="M19 12H5"></path>
      </svg>
    );
    const IconWand = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M15 4V2"></path>
        <path d="M15 16a5 5 0 1 1-4.995-5.217L2 2.5h4l2.5 2.5"></path>
      </svg>
    );

    // ── Data & config ────────────────────────────────────────────────────
    const CATEGORIES = [
      { key: 'model', label: 'LLM 模型', icon: IconBot, color: '#002fa7' },
      { key: 'embedding', label: 'Embedding', icon: IconSparkles, color: '#f59e0b' },
      { key: 'rag', label: 'RAG 设置', icon: IconDatabase, color: '#7c3aed' },
      { key: 'memory', label: '记忆管理', icon: IconBrain, color: '#7c3aed' },
      { key: 'data', label: '数据管理', icon: IconHardDrive, color: '#10b981' },
      { key: 'advanced', label: '高级设置', icon: IconSliders, color: '#6b7280' },
      { key: 'system', label: '系统状态', icon: IconActivity, color: '#002fa7' },
    ];

    const SERVICE_META = {
      ai_gateway: {
        label: 'AI Gateway (Higress)',
        description: '统一模型路由、计量与限流',
        icon: IconBot,
        color: '#002fa7',
        details: [
          { label: '功能', value: 'LLM 请求代理 / Token 计量 / 限流' },
          { label: '检测地址', value: 'http://localhost:8080/health' },
          { label: '降级策略', value: '直接连接模型提供商' },
        ],
      },
      milvus: {
        label: 'Milvus 向量库',
        description: '语义检索与多模态向量存储',
        icon: IconDatabase,
        color: '#7c3aed',
        details: [
          { label: '功能', value: '向量检索 / 记忆相似度匹配' },
          { label: '检测地址', value: 'http://localhost:19530' },
          { label: '降级策略', value: '关闭 RAG，使用完整上下文' },
        ],
      },
      mineru: {
        label: 'MinerU PDF 解析',
        description: '高质量 PDF/Office 版面解析',
        icon: IconHardDrive,
        color: '#10b981',
        details: [
          { label: '功能', value: 'PDF 结构化提取 / 版面还原' },
          { label: '检测地址', value: 'http://localhost:8000/health' },
          { label: '降级策略', value: '跳过文档解析，仅处理文本' },
        ],
      },
    };

    const INITIAL_SERVICES = {
      ai_gateway: { available: true, reason: '' },
      milvus: { available: true, reason: '' },
      mineru: { available: false, reason: '服务未启动：Connection refused (localhost:8000)' },
    };

    // ── Components ───────────────────────────────────────────────────────
    function Navbar() {
      return (
        <nav className="glass sticky top-0 z-50 h-11 flex items-center justify-between px-3 border-b border-black/[0.06]">
          <div className="w-[120px]"></div>
          <div className="flex items-center min-w-0">
            <div className="w-6 h-6 rounded-md bg-gradient-to-br from-[#002fa7] to-[#4070ff] flex items-center justify-center mr-2">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="white" fillOpacity="0.9"></path>
                <path d="M2 17L12 22L22 17" stroke="white" strokeOpacity="0.7" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"></path>
                <path d="M2 12L12 17L22 12" stroke="white" strokeOpacity="0.85" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"></path>
              </svg>
            </div>
            <span className="font-semibold text-[14px] tracking-tight text-gray-800">PuddingClaw</span>
          </div>
          <div className="w-[120px]"></div>
        </nav>
      );
    }

    function Sidebar({ active, onChange }) {
      return (
        <div className="w-52 glass border-r border-black/[0.06] shrink-0 p-3 flex flex-col">
          <button className="flex items-center gap-2.5 px-3 py-2.5 mb-3 text-[13px] font-medium text-gray-700 bg-black/[0.04] hover:bg-black/[0.08] rounded-xl transition-all group">
            <IconArrowLeft className="w-4 h-4 text-gray-500 group-hover:text-gray-700 transition-colors"></IconArrowLeft>
            返回应用
          </button>
          <div className="space-y-0.5">
            {CATEGORIES.map((cat) => {
              const Icon = cat.icon;
              const isActive = active === cat.key;
              return (
                <button
                  key={cat.key}
                  onClick={() => onChange(cat.key)}
                  className={`w-full flex items-center gap-2.5 px-3 py-2 text-[12px] rounded-lg transition-all text-left ${
                    isActive ? 'bg-white/70 text-gray-800 font-medium shadow-sm' : 'text-gray-500 hover:bg-white/40'
                  }`}
                >
                  <Icon className="w-3.5 h-3.5" style={isActive ? { color: cat.color } : {}}></Icon>
                  {cat.label}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function StatusBadge({ available }) {
      return available ? (
        <span className="inline-flex items-center gap-1.5 rounded-full bg-emerald-50/80 px-2 py-0.5 text-[11px] font-medium text-emerald-600 border border-emerald-100/60">
          <span className="relative flex h-2 w-2">
            <span className="status-dot-pulse absolute inset-0 text-emerald-500"></span>
            <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
          </span>
          可用
        </span>
      ) : (
        <span className="inline-flex items-center gap-1.5 rounded-full bg-gray-100 px-2 py-0.5 text-[11px] font-medium text-gray-500 border border-gray-200/60">
          <span className="rounded-full h-2 w-2 bg-gray-400"></span>
          未启用
        </span>
      );
    }

    function ServiceCard({ serviceKey, service, expanded, onToggle }) {
      const meta = SERVICE_META[serviceKey];
      const Icon = meta.icon;
      return (
        <div
          onClick={onToggle}
          className={`glass-card glass-card-hover rounded-2xl p-4 cursor-pointer transition-all duration-200 ${expanded ? 'ring-1 ring-[#002fa7]/10 shadow-md' : 'shadow-sm hover:shadow-md'}`}
        >
          <div className="flex items-start gap-3.5">
            <div
              className="w-10 h-10 rounded-xl flex items-center justify-center shrink-0"
              style={{ background: `${meta.color}10`, color: meta.color }}
            >
              <Icon className="w-5 h-5"></Icon>
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center justify-between gap-3">
                <div>
                  <h3 className="text-[13px] font-semibold text-gray-800">{meta.label}</h3>
                  <p className="text-[11px] text-gray-500 mt-0.5">{meta.description}</p>
                </div>
                <StatusBadge available={service.available}></StatusBadge>
              </div>

              {!service.available && service.reason && (
                <div className="mt-3 flex items-start gap-2 rounded-lg bg-red-50/60 border border-red-100/70 px-3 py-2 text-[11px] text-red-600">
                  <IconAlert className="w-3.5 h-3.5 shrink-0 mt-0.5"></IconAlert>
                  <span className="break-all">{service.reason}</span>
                </div>
              )}

              <div
                className={`grid transition-all duration-250 ${expanded ? 'grid-rows-[1fr] opacity-100 mt-3' : 'grid-rows-[0fr] opacity-0 mt-0'}`}
              >
                <div className="overflow-hidden">
                  <div className="rounded-xl bg-black/[0.02] border border-black/[0.05] p-3 space-y-2">
                    {meta.details.map((d) => (
                      <div key={d.label} className="flex items-start gap-2">
                        <span className="text-[10px] font-medium text-gray-400 uppercase tracking-wide w-16 shrink-0 pt-0.5">{d.label}</span>
                        <span className="text-[11px] text-gray-600">{d.value}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              <div className="mt-2 flex items-center justify-end">
                <span className={`text-[10px] text-gray-400 flex items-center gap-0.5 transition-transform duration-200 ${expanded ? 'rotate-180' : ''}`}>
                  <IconChevronDown className="w-3.5 h-3.5"></IconChevronDown>
                  {expanded ? '收起详情' : '查看详情'}
                </span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function SummaryBar({ services, loading, lastChecked, onRefresh }) {
      const total = Object.keys(services).length;
      const online = Object.values(services).filter((s) => s.available).length;
      const healthy = online === total;

      return (
        <div className="glass-card rounded-2xl p-4 mb-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
          <div className="flex items-center gap-3">
            <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${healthy ? 'bg-emerald-50 text-emerald-600' : 'bg-amber-50 text-amber-600'}`}>
              {healthy ? <IconCheck className="w-5 h-5"></IconCheck> : <IconAlert className="w-5 h-5"></IconAlert>}
            </div>
            <div>
              <h3 className="text-[13px] font-semibold text-gray-800">
                {healthy ? '全部服务在线' : `${total - online} 项服务未就绪`}
              </h3>
              <p className="text-[11px] text-gray-500">
                {online}/{total} 在线 · {lastChecked ? `上次检测 ${lastChecked}` : '尚未检测'}
              </p>
            </div>
          </div>
          <button
            onClick={onRefresh}
            disabled={loading}
            className="self-start sm:self-auto flex items-center gap-1.5 px-3.5 py-2 text-[12px] font-medium rounded-xl bg-[#002fa7]/10 text-[#002fa7] hover:bg-[#002fa7]/15 active:scale-95 transition-all disabled:opacity-50 disabled:active:scale-100"
          >
            {loading ? <IconLoader className="w-3.5 h-3.5 animate-spin"></IconLoader> : <IconActivity className="w-3.5 h-3.5"></IconActivity>}
            {loading ? '检测中…' : '立即刷新'}
          </button>
        </div>
      );
    }

    function PlaceholderCard({ title, icon: Icon, color }) {
      return (
        <div className="glass-card rounded-2xl p-5 animate-fade-in">
          <div className="flex items-center gap-2 mb-4">
            <Icon className="w-4 h-4" style={{ color }}></Icon>
            <h2 className="text-[14px] font-semibold text-gray-800">{title}</h2>
          </div>
          <div className="space-y-3">
            <div className="h-9 bg-black/[0.04] rounded-lg"></div>
            <div className="h-9 bg-black/[0.04] rounded-lg"></div>
            <div className="h-9 bg-black/[0.04] rounded-lg"></div>
          </div>
        </div>
      );
    }

    function MainPlaceholder() {
      return (
        <div className="max-w-2xl mx-auto space-y-6 animate-fade-in">
          <PlaceholderCard title="LLM 模型配置" icon={IconBot} color="#002fa7"></PlaceholderCard>
          <PlaceholderCard title="Embedding 模型配置" icon={IconSparkles} color="#f59e0b"></PlaceholderCard>
        </div>
      );
    }

    function TweaksPanel({ open, onToggle, services, onChange, onSimulateError, simulateError }) {
      return (
        <div className="fixed bottom-4 right-4 z-50 flex flex-col items-end gap-2">
          <button
            onClick={onToggle}
            className="flex items-center gap-1.5 px-3 py-2 text-[12px] font-medium rounded-full bg-gray-800 text-white shadow-lg hover:bg-gray-700 transition-colors"
          >
            <IconWand className="w-3.5 h-3.5"></IconWand>
            {open ? '收起调试' : '调试面板'}
          </button>
          {open && (
            <div className="w-64 glass-card rounded-2xl p-4 shadow-xl animate-slide-up">
              <h4 className="text-[12px] font-semibold text-gray-800 mb-3">模拟服务状态</h4>
              <div className="space-y-2.5 mb-4">
                {Object.entries(SERVICE_META).map(([key, meta]) => (
                  <label key={key} className="flex items-center justify-between text-[11px] text-gray-600 cursor-pointer">
                    {meta.label}
                    <input
                      type="checkbox"
                      checked={services[key].available}
                      onChange={(e) => onChange(key, e.target.checked)}
                      className="w-4 h-4 accent-[#002fa7]"
                    ></input>
                  </label>
                ))}
              </div>
              <label className="flex items-center justify-between text-[11px] text-gray-600 cursor-pointer pb-3 border-b border-black/[0.06]">
                模拟获取失败
                <input
                  type="checkbox"
                  checked={simulateError}
                  onChange={(e) => onSimulateError(e.target.checked)}
                  className="w-4 h-4 accent-red-500"
                ></input>
              </label>
              <p className="mt-3 text-[10px] text-gray-400 leading-relaxed">
                仅用于原型演示，方便观察加载、错误与不同可用性组合下的界面表现。
              </p>
            </div>
          )}
        </div>
      );
    }

    function SystemStatus({ services, loading, error, lastChecked, onRefresh, onToggleDetail, expanded }) {
      if (error) {
        return (
          <div className="glass-card rounded-2xl p-5">
            <div className="flex items-start gap-3 rounded-xl border border-red-100 bg-red-50/60 px-4 py-3.5 text-[12px] text-red-600">
              <IconAlert className="w-4 h-4 shrink-0 mt-0.5"></IconAlert>
              <div>
                <p className="font-medium">无法获取服务状态</p>
                <p className="mt-0.5 text-red-500/80">{error}</p>
              </div>
            </div>
            <button
              onClick={onRefresh}
              className="mt-3 text-[12px] font-medium text-[#002fa7] hover:underline"
            >
              重试
            </button>
          </div>
        );
      }

      return (
        <div className="space-y-4 animate-fade-in">
          <SummaryBar services={services} loading={loading} lastChecked={lastChecked} onRefresh={onRefresh}></SummaryBar>
          <div className="grid gap-3">
            {Object.entries(services).map(([key, service]) => (
              <ServiceCard
                key={key}
                serviceKey={key}
                service={service}
                expanded={expanded[key]}
                onToggle={() => onToggleDetail(key)}
              ></ServiceCard>
            ))}
          </div>
          <p className="text-[11px] text-gray-500 leading-relaxed px-1">
            Core 模式无需这些服务即可运行；Full 模式会启用全部能力。Unavailable 的服务会自动降级。
          </p>
        </div>
      );
    }

    function App() {
      const [category, setCategory] = useState('system');
      const [services, setServices] = useState(INITIAL_SERVICES);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [lastChecked, setLastChecked] = useState(null);
      const [expanded, setExpanded] = useState({ ai_gateway: false, milvus: false, mineru: false });
      const [tweaksOpen, setTweaksOpen] = useState(false);
      const [simulateError, setSimulateError] = useState(false);

      const refresh = useCallback(() => {
        setLoading(true);
        setError(null);
        setTimeout(() => {
          if (simulateError) {
            setError('后端连接超时：无法访问 /api/capabilities');
            setLoading(false);
            return;
          }
          setServices((prev) => ({ ...prev }));
          setLastChecked(new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }));
          setLoading(false);
        }, 900);
      }, [simulateError]);

      useEffect(() => {
        refresh();
        const timer = setInterval(refresh, 30000);
        return () => clearInterval(timer);
      }, [refresh]);

      const toggleDetail = useCallback((key) => {
        setExpanded((prev) => ({ ...prev, [key]: !prev[key] }));
      }, []);

      const setServiceAvailable = useCallback((key, available) => {
        setServices((prev) => ({
          ...prev,
          [key]: {
            ...prev[key],
            available,
            reason: available ? '' : '服务未启动：Connection refused',
          },
        }));
      }, []);

      return (
        <div className="h-screen flex flex-col">
          <Navbar></Navbar>
          <div className="flex-1 flex overflow-hidden">
            <Sidebar active={category} onChange={setCategory}></Sidebar>
            <main className="flex-1 overflow-y-auto p-6 scrollbar-hide">
              <div className="max-w-2xl mx-auto">
                {category !== 'system' ? (
                  <MainPlaceholder></MainPlaceholder>
                ) : (
                  <div className="space-y-6">
                    <div className="glass-card rounded-2xl p-5">
                      <div className="flex items-center gap-2 mb-4">
                        <IconActivity className="w-4 h-4" style={{ color: '#002fa7' }}></IconActivity>
                        <h2 className="text-[14px] font-semibold text-gray-800">系统状态</h2>
                      </div>
                      <SystemStatus
                        services={services}
                        loading={loading}
                        error={error}
                        lastChecked={lastChecked}
                        onRefresh={refresh}
                        onToggleDetail={toggleDetail}
                        expanded={expanded}
                      ></SystemStatus>
                    </div>
                  </div>
                )}
              </div>
            </main>
          </div>
          <TweaksPanel
            open={tweaksOpen}
            onToggle={() => setTweaksOpen((v) => !v)}
            services={services}
            onChange={setServiceAvailable}
            onSimulateError={setSimulateError}
            simulateError={simulateError}
          ></TweaksPanel>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App></App>);
  </script>
</body>
</html>
