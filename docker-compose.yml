# PuddingClaw Docker Compose
#
# Core 模式：
#   docker compose up --build -d
#
# Full 模式（含 AI Gateway、向量库）：
#   docker compose --profile full up --build -d
#
# 访问：
#   前端：http://localhost:3000
#   后端 API：http://localhost:8888
#   API 文档：http://localhost:8888/docs
#   Higress Gateway：http://localhost:8081
#   Higress Console：http://localhost:8001
#
# 注意：
#   若本机运行 MinerU，请在 backend/.env 中设置
#   MINERU_URL=http://host.docker.internal:8002
#
#   Full 模式下 backend 默认指向 Higress，首次启动后需要访问 Console 配置 Provider：
#   http://localhost:8001

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: puddingclaw-backend
    ports:
      - "8888:9100"
    env_file:
      - ./backend/.env
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=9100
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      # 其他环境变量在 backend/.env 中配置（如 MINERU_URL、AI_GATEWAY_URL）
    volumes:
      # 持久化会话、workspace、memory、日志到宿主机
      - ./backend/sessions:/app/sessions
      - ./backend/workspace:/app/workspace
      - ./backend/memory:/app/memory
      - ./backend/logs:/app/logs
      # 挂载 skills，允许容器内 API/工具写入（import/save/rename/version）
      - ./backend/skills:/app/skills
      # 挂载静态系统提示词文件，便于在容器外修改后无需重建镜像
      - ./backend/prompts:/app/prompts:ro
      # 挂载 .env 与 config.json，便于在容器外修改配置
      - ./backend/.env:/app/.env:ro
      - ./backend/config.json:/app/config.json
      - ./logging.yaml:/app/logging.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: puddingclaw-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # 浏览器请求同源 /api，由 Next 容器转发到后端服务。
      - BACKEND_INTERNAL_URL=http://backend:9100
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  higress:
    image: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/all-in-one:latest
    container_name: puddingclaw-higress
    profiles: ["full"]
    ports:
      # 8080 被 milvus-attu 占用，宿主机映射到 8081
      - "8081:8080"
      - "8001:8001"
    environment:
      - MODE=full
      - USE_PLUGIN_SERVER=on
      - ENABLE_CONSOLE_ROUTE=1
    volumes:
      # 持久化 Higress 配置，避免每次重启后 Provider 配置丢失
      - ./data/higress:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# 可选：使用外部网络，便于与其他服务（如 Milvus）集成
# networks:
#   default:
#     name: puddingclaw-network
